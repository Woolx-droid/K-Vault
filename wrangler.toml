# Pages/Worker 项目基本配置
name = "k-vault"  # 替换成你的 Cloudflare Pages/Worker 项目名
compatibility_date = "2026-03-13"  # 兼容日期，用最新的即可

# 环境变量配置（包含 R2 启用开关 + 之前的 Telegram 低 KV 写入模式）
[vars]
USE_R2 = "true"  # 启用 R2 存储（必填）
# 可选：Telegram 低 KV 写入模式（按需开启，注释掉不需要的）
# TELEGRAM_LINK_MODE = "signed"
# MINIMIZE_KV_WRITES = "true"
# TELEGRAM_METADATA_MODE = "off"

# R2 存储桶绑定（必填）
[[r2_buckets]]
binding = "R2_BUCKET"  # 必须和代码里的 env.R2_BUCKET 一致
bucket_name = "k-vault-files"  # 你的 R2 存储桶名称（创建的是这个名就不用改）
# 可选：如果需要指定区域，取消注释并填写
# preview_bucket_name = "k-vault-files"
