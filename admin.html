<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>K-Vault | Admin Console</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/logo.png">
  <link rel="shortcut icon" href="/favicon.ico">
  <link rel="stylesheet" href="/theme.css">
  <script src="/theme.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free/css/all.min.css">
  <style>
    :root {
      --wf-surface: rgba(255, 255, 255, 0.92);
      --wf-border: rgba(255, 255, 255, 0.58);
      --wf-shadow: 0 10px 28px rgba(20, 32, 55, 0.12);
      --wf-shadow-soft: 0 6px 18px rgba(20, 32, 55, 0.1);
      --wf-primary: #0f766e;
      --wf-primary-soft: rgba(15, 118, 110, 0.13);
    }

    html[data-theme="dark"] {
      --wf-surface: rgba(16, 26, 43, 0.9);
      --wf-border: rgba(120, 145, 192, 0.32);
      --wf-shadow: 0 12px 30px rgba(0, 0, 0, 0.45);
      --wf-shadow-soft: 0 8px 20px rgba(0, 0, 0, 0.3);
      --wf-primary: #67d4c2;
      --wf-primary-soft: rgba(103, 212, 194, 0.17);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(60vw 50vh at 12% 8%, rgba(12, 164, 133, 0.2), transparent 70%),
        radial-gradient(50vw 45vh at 88% 14%, rgba(255, 166, 104, 0.24), transparent 72%),
        linear-gradient(130deg, #eef6ff 0%, #ecfffa 50%, #fff4ea 100%);
      color: #1f2937;
      font-family: "Manrope", "Noto Sans SC", "PingFang SC", "Segoe UI", sans-serif;
    }

    html[data-theme="dark"] body {
      color: #e7eeff;
      background:
        radial-gradient(60vw 50vh at 12% 8%, rgba(64, 129, 255, 0.2), transparent 70%),
        radial-gradient(50vw 45vh at 88% 14%, rgba(68, 170, 146, 0.2), transparent 72%),
        linear-gradient(140deg, #0a1222 0%, #0d1729 52%, #132237 100%);
    }

    .page {
      max-width: 1460px;
      margin: 0 auto;
      padding: 16px;
    }

    .header {
      position: sticky;
      top: 14px;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-radius: 16px;
      background: var(--wf-surface);
      border: 1px solid var(--wf-border);
      box-shadow: var(--wf-shadow-soft);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      margin-bottom: 14px;
    }

    .header-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: "Sora", "Manrope", "Noto Sans SC", sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: inherit;
      margin: 0;
    }

    .header-title i {
      color: var(--wf-primary);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .action-link,
    .load-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 1px solid var(--wf-border);
      border-radius: 12px;
      padding: 10px 14px;
      min-height: 40px;
      background: var(--wf-surface);
      color: inherit;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      font-weight: 600;
      box-shadow: 0 0 0 transparent;
    }

    .action-link:hover,
    .load-btn:hover {
      border-color: rgba(15, 118, 110, 0.4);
      background: var(--wf-primary-soft);
      box-shadow: var(--wf-shadow-soft);
    }

    .load-wrap {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 0 8px;
    }

    .load-btn {
      min-width: 148px;
      border-color: rgba(15, 118, 110, 0.24);
      background: linear-gradient(135deg, rgba(15, 118, 110, 0.14), rgba(126, 214, 196, 0.2));
    }

    .load-btn[disabled] {
      opacity: 0.6;
      cursor: wait;
    }

    .explorer {
      display: grid;
      grid-template-columns: 290px minmax(0, 1fr);
      gap: 14px;
    }

    .folders,
    .files {
      border: 1px solid var(--wf-border);
      background: var(--wf-surface);
      border-radius: 16px;
      box-shadow: var(--wf-shadow-soft);
    }

    .folders-head,
    .files-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      padding: 12px;
      border-bottom: 1px solid var(--wf-border);
    }

    .folders-head {
      justify-content: space-between;
    }

    .folders-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .folder-tree {
      max-height: 66vh;
      overflow: auto;
      padding: 10px;
      display: grid;
      gap: 6px;
    }

    .folder-item {
      border: 1px solid transparent;
      border-radius: 10px;
      background: transparent;
      color: inherit;
      text-align: left;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 8px;
      cursor: pointer;
    }

    .folder-item:hover {
      border-color: var(--wf-border);
      background: var(--wf-primary-soft);
    }

    .folder-item.active {
      border-color: rgba(15, 118, 110, 0.45);
      background: var(--wf-primary-soft);
    }

    .folder-item-name {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .folder-item-count {
      font-size: 0.75rem;
      color: #64748b;
    }

    html[data-theme="dark"] .folder-item-count {
      color: #9aa9c7;
    }

    .files-toolbar input,
    .files-toolbar select {
      border: 1px solid var(--wf-border);
      border-radius: 10px;
      background: var(--wf-surface);
      color: inherit;
      padding: 10px;
    }

    .files-toolbar input {
      min-width: 220px;
      flex: 1;
    }

    .meta-row {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      padding: 8px 12px;
      font-size: 0.85rem;
      color: #64748b;
      border-bottom: 1px solid var(--wf-border);
    }

    html[data-theme="dark"] .meta-row {
      color: #9aa9c7;
    }

    .table-wrap {
      max-height: 56vh;
      overflow: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th,
    td {
      text-align: left;
      border-bottom: 1px solid var(--wf-border);
      padding: 9px;
      font-size: 0.88rem;
      vertical-align: middle;
    }

    th {
      position: sticky;
      top: 0;
      background: var(--wf-surface);
      z-index: 2;
    }

    .storage-chip {
      border: 1px solid var(--wf-border);
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 0.75rem;
      color: #64748b;
    }

    html[data-theme="dark"] .storage-chip {
      color: #9aa9c7;
    }

    .row-actions {
      display: inline-flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .row-actions .load-btn {
      padding: 6px 8px;
      min-height: auto;
      font-size: 0.78rem;
    }

    .status-line {
      font-size: 0.84rem;
      color: #64748b;
    }

    html[data-theme="dark"] .status-line {
      color: #9aa9c7;
    }

    .masonry {
      column-count: 5;
      column-gap: 14px;
      margin: 0;
    }

    .masonry-item {
      break-inside: avoid;
      display: inline-block;
      width: 100%;
      margin: 0 0 14px;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--wf-border);
      background: var(--wf-surface);
      box-shadow: var(--wf-shadow-soft);
      cursor: zoom-in;
      transition: box-shadow 0.2s ease;
    }

    .masonry-item:hover {
      box-shadow: var(--wf-shadow);
    }

    .masonry-item img {
      display: block;
      width: 100%;
      height: auto;
      object-fit: cover;
      background: rgba(15, 23, 42, 0.06);
    }

    .masonry-caption {
      padding: 10px 12px;
      font-size: 0.8rem;
      line-height: 1.4;
      color: #4b5563;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    html[data-theme="dark"] .masonry-caption {
      color: #c1cde4;
    }

    .empty-state {
      display: none;
      text-align: center;
      padding: 52px 20px;
      border: 1px dashed var(--wf-border);
      border-radius: 16px;
      background: var(--wf-surface);
      color: #6b7280;
    }

    .empty-state i {
      font-size: 1.8rem;
      margin-bottom: 10px;
      color: var(--wf-primary);
    }

    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 3000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 14px;
      background: rgba(2, 6, 23, 0.84);
      backdrop-filter: blur(4px);
    }

    .lightbox.open {
      display: flex;
    }

    .lightbox-content {
      width: min(96vw, 1280px);
      max-height: 90vh;
      border-radius: 16px;
      overflow: hidden;
      background: #050911;
      border: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow: 0 18px 34px rgba(0, 0, 0, 0.45);
      position: relative;
    }

    .lightbox-content img {
      display: block;
      width: 100%;
      max-height: 90vh;
      object-fit: contain;
    }

    .lightbox-meta {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 11px 14px;
      color: #dbe9ff;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.74), rgba(0, 0, 0, 0.05));
      font-size: 0.82rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .lightbox-close {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 40px;
      height: 40px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      transition: background 0.2s ease;
    }

    .lightbox-close:hover {
      background: rgba(0, 0, 0, 0.72);
    }

    @media (max-width: 1200px) {
      .explorer {
        grid-template-columns: 250px minmax(0, 1fr);
      }
    }

    @media (max-width: 900px) {
      .explorer {
        grid-template-columns: 1fr;
      }

      .folder-tree {
        max-height: 260px;
      }

      .table-wrap {
        max-height: none;
      }
    }

    @media (max-width: 640px) {
      .page {
        padding: 10px;
      }

      .header {
        top: 8px;
        border-radius: 14px;
        padding: 10px 12px;
        flex-wrap: wrap;
      }

      .header-title {
        font-size: 1rem;
        width: 100%;
      }

      .header-actions {
        width: 100%;
        justify-content: flex-start;
        overflow-x: auto;
        scrollbar-width: none;
      }

      .header-actions::-webkit-scrollbar {
        display: none;
      }

      .action-link {
        flex: 0 0 auto;
        font-size: 0.82rem;
      }

      .lightbox {
        padding: 8px;
      }

      .lightbox-content {
        width: 100%;
        border-radius: 12px;
      }
    }

    @media (max-width: 420px) {
      .load-btn {
        width: 100%;
      }
    }
  </style>
  <link rel="stylesheet" href="/mobile-refactor.css">
</head>
<body>
  <main class="page">
    <header class="header">
      <h1 class="header-title">
        <i class="fas fa-folder-tree"></i>
        <span>Admin Console</span>
      </h1>
      <div class="header-actions">
        <a class="action-link" href="./"><i class="fas fa-home"></i><span>Upload</span></a>
        <a class="action-link" href="./gallery.html"><i class="fas fa-images"></i><span>Gallery</span></a>
        <a class="action-link" href="./webdav.html"><i class="fas fa-hard-drive"></i><span>WebDAV</span></a>
        <a class="action-link" href="./admin.html"><i class="fas fa-th-large"></i><span>Admin</span></a>
      </div>
    </header>

    <section class="explorer">
      <aside class="folders">
        <div class="folders-head">
          <strong>Folders</strong>
          <div class="folders-actions">
            <button id="newFolderBtn" class="load-btn" type="button">New</button>
            <button id="renameFolderBtn" class="load-btn" type="button">Rename</button>
            <button id="deleteFolderBtn" class="load-btn" type="button">Delete</button>
          </div>
        </div>
        <div id="folderTree" class="folder-tree"></div>
      </aside>

      <article class="files">
        <div class="files-toolbar">
          <input id="searchInput" type="text" placeholder="Search by name or id" />
          <select id="storageFilter">
            <option value="all">All Storage</option>
            <option value="telegram">Telegram</option>
            <option value="r2">R2</option>
            <option value="s3">S3</option>
            <option value="discord">Discord</option>
            <option value="huggingface">HuggingFace</option>
            <option value="webdav">WebDAV</option>
            <option value="github">GitHub</option>
          </select>
          <button id="refreshBtn" class="load-btn" type="button">Refresh</button>
        </div>
        <div class="files-toolbar">
          <button id="moveSelectedBtn" class="load-btn" type="button" disabled>Move Selected</button>
          <button id="copySelectedBtn" class="load-btn" type="button" disabled>Copy Links</button>
          <button id="deleteSelectedBtn" class="load-btn" type="button" disabled>Delete Selected</button>
        </div>
        <div class="meta-row">
          <span id="currentFolder">Current: /</span>
          <span id="statsText">Files: 0</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th><input id="selectAll" type="checkbox" /></th>
                <th>Name</th>
                <th>Storage</th>
                <th>Size</th>
                <th>Updated</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="fileBody"></tbody>
          </table>
        </div>
        <div class="load-wrap">
          <span id="statusLine" class="status-line">Ready</span>
          <button id="loadMoreBtn" class="load-btn" type="button" style="display: none">
            <i class="fas fa-cloud-download-alt"></i>
            <span>Load More</span>
          </button>
        </div>
      </article>
    </section>
  </main>

  <script>
    (function () {
      "use strict";

      var state = {
        files: [],
        folders: [],
        cursor: null,
        loading: false,
        folderPath: "",
        search: "",
        storage: "all",
        selected: new Set(),
      };

      var el = {
        folderTree: document.getElementById("folderTree"),
        fileBody: document.getElementById("fileBody"),
        loadMoreBtn: document.getElementById("loadMoreBtn"),
        statusLine: document.getElementById("statusLine"),
        currentFolder: document.getElementById("currentFolder"),
        statsText: document.getElementById("statsText"),
        searchInput: document.getElementById("searchInput"),
        storageFilter: document.getElementById("storageFilter"),
        refreshBtn: document.getElementById("refreshBtn"),
        newFolderBtn: document.getElementById("newFolderBtn"),
        renameFolderBtn: document.getElementById("renameFolderBtn"),
        deleteFolderBtn: document.getElementById("deleteFolderBtn"),
        moveSelectedBtn: document.getElementById("moveSelectedBtn"),
        copySelectedBtn: document.getElementById("copySelectedBtn"),
        deleteSelectedBtn: document.getElementById("deleteSelectedBtn"),
        selectAll: document.getElementById("selectAll"),
      };

      function normalizeFolderPath(value) {
        var raw = String(value || "").replace(/\\/g, "/").trim();
        if (!raw) return "";
        var items = [];
        raw.split("/").forEach(function (segment) {
          var part = segment.trim();
          if (!part || part === ".") return;
          if (part === "..") {
            items.pop();
            return;
          }
          items.push(part);
        });
        return items.join("/");
      }

      function escapeHtml(text) {
        return String(text || "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function formatBytes(bytes) {
        var n = Number(bytes || 0);
        if (!Number.isFinite(n) || n <= 0) return "0 B";
        var units = ["B", "KB", "MB", "GB", "TB"];
        var i = 0;
        while (n >= 1024 && i < units.length - 1) {
          n /= 1024;
          i += 1;
        }
        return n.toFixed(i === 0 ? 0 : 2) + " " + units[i];
      }

      function formatTime(value) {
        var n = Number(value || 0);
        if (!Number.isFinite(n) || n <= 0) return "-";
        try {
          return new Date(n).toLocaleString();
        } catch (_) {
          return "-";
        }
      }

      function setStatus(message, isError) {
        el.statusLine.textContent = message;
        el.statusLine.style.color = isError ? "#ef4444" : "";
      }

      function updateMeta() {
        el.currentFolder.textContent = "Current: /" + (state.folderPath || "");
        el.statsText.textContent = "Files: " + state.files.length + " | Selected: " + state.selected.size;
        var hasSelected = state.selected.size > 0;
        el.moveSelectedBtn.disabled = !hasSelected;
        el.copySelectedBtn.disabled = !hasSelected;
        el.deleteSelectedBtn.disabled = !hasSelected;
        el.selectAll.checked = state.files.length > 0 && state.selected.size === state.files.length;
      }

      async function request(url, options) {
        var response = await fetch(url, Object.assign({ credentials: "include" }, options || {}));
        var data = await response.json().catch(function () { return null; });
        if (!response.ok) {
          var message = data && (data.error || data.message || data.errorDetail);
          throw new Error(message || ("Request failed (" + response.status + ")"));
        }
        return data;
      }

      async function ensureAuth() {
        var data = await request("./api/auth/check");
        if (data.authRequired && !data.authenticated) {
          var redirect = encodeURIComponent(window.location.pathname + window.location.search);
          window.location.href = "./login.html?redirect=" + redirect;
          return false;
        }
        return true;
      }

      async function loadFolders() {
        var data = await request("./api/manage/folders?storage=" + encodeURIComponent(state.storage));
        state.folders = (data.folders || []).map(function (item) {
          var path = normalizeFolderPath(item.path || item.folderPath || "");
          return {
            path: path,
            name: item.name || (path ? path.split("/").pop() : "All Files"),
            depth: Number(item.depth || (path ? path.split("/").length : 0)),
            fileCount: Number(item.fileCount || 0),
          };
        });
        renderFolders();
      }

      function buildListUrl(reset) {
        var params = new URLSearchParams();
        params.set("limit", "100");
        params.set("folderPath", state.folderPath || "");
        params.set("storage", state.storage || "all");
        params.set("includeStats", "1");
        if (state.search) params.set("search", state.search);
        if (!reset && state.cursor) params.set("cursor", state.cursor);
        return "./api/manage/list?" + params.toString();
      }

      async function loadFiles(reset) {
        if (state.loading) return;
        state.loading = true;
        el.loadMoreBtn.disabled = true;
        setStatus("Loading...");
        try {
          if (reset) {
            state.cursor = null;
            state.selected.clear();
            state.files = [];
            renderFiles();
          }
          var data = await request(buildListUrl(reset));
          var mapped = (data.keys || []).map(function (file) {
            var metadata = file.metadata || {};
            return {
              id: String(file.name || ""),
              fileName: String(metadata.fileName || file.name || ""),
              storageType: String(metadata.storageType || "telegram"),
              fileSize: Number(metadata.fileSize || 0),
              timestamp: Number(metadata.TimeStamp || 0),
            };
          });

          if (reset) {
            state.files = mapped;
          } else {
            var all = state.files.concat(mapped);
            var byId = new Map();
            all.forEach(function (item) {
              byId.set(item.id, item);
            });
            state.files = Array.from(byId.values());
          }

          state.cursor = data.list_complete ? null : String(data.cursor || "");
          el.loadMoreBtn.style.display = state.cursor ? "inline-flex" : "none";
          renderFiles();
          setStatus("Loaded");
        } finally {
          state.loading = false;
          el.loadMoreBtn.disabled = false;
        }
      }

      function renderFolders() {
        var base = [{ path: "", name: "All Files", depth: 0, fileCount: state.files.length }];
        var list = base.concat(state.folders).sort(function (a, b) {
          if (a.depth !== b.depth) return a.depth - b.depth;
          return String(a.path).localeCompare(String(b.path));
        });

        el.folderTree.innerHTML = list.map(function (folder) {
          var active = normalizeFolderPath(folder.path) === state.folderPath;
          return (
            '<button class="folder-item' + (active ? " active" : "") + '" data-path="' + escapeHtml(folder.path) + '" style="padding-left:' + (8 + folder.depth * 14) + 'px">' +
            '<span class="folder-item-name"><i class="fas fa-folder"></i><span>' + escapeHtml(folder.name) + "</span></span>" +
            '<span class="folder-item-count">' + Number(folder.fileCount || 0) + "</span>" +
            "</button>"
          );
        }).join("");

        Array.prototype.forEach.call(el.folderTree.querySelectorAll("[data-path]"), function (button) {
          button.addEventListener("click", function () {
            state.folderPath = normalizeFolderPath(button.getAttribute("data-path") || "");
            loadFiles(true).catch(handleError);
            renderFolders();
          });
        });
      }

      function renderFiles() {
        if (!state.files.length) {
          el.fileBody.innerHTML = '<tr><td colspan="6"><div class="empty-state" style="display:block;padding:24px;border:none">No files in this folder.</div></td></tr>';
          updateMeta();
          return;
        }

        el.fileBody.innerHTML = state.files.map(function (file) {
          var checked = state.selected.has(file.id) ? " checked" : "";
          return (
            "<tr>" +
            '<td><input type="checkbox" data-select="' + escapeHtml(file.id) + '"' + checked + " /></td>" +
            "<td><strong>" + escapeHtml(file.fileName) + "</strong><br><small>" + escapeHtml(file.id) + "</small></td>" +
            '<td><span class="storage-chip">' + escapeHtml(file.storageType) + "</span></td>" +
            "<td>" + escapeHtml(formatBytes(file.fileSize)) + "</td>" +
            "<td>" + escapeHtml(formatTime(file.timestamp)) + "</td>" +
            "<td><div class=\"row-actions\">" +
            '<button class="load-btn" data-copy="' + escapeHtml(file.id) + '">Direct</button>' +
            '<button class="load-btn" data-move="' + escapeHtml(file.id) + '">Move</button>' +
            '<button class="load-btn" data-delete="' + escapeHtml(file.id) + '">Delete</button>' +
            "</div></td>" +
            "</tr>"
          );
        }).join("");

        Array.prototype.forEach.call(el.fileBody.querySelectorAll("[data-select]"), function (node) {
          node.addEventListener("change", function () {
            var id = node.getAttribute("data-select");
            if (!id) return;
            if (node.checked) state.selected.add(id);
            else state.selected.delete(id);
            updateMeta();
          });
        });

        Array.prototype.forEach.call(el.fileBody.querySelectorAll("[data-copy]"), function (node) {
          node.addEventListener("click", function () {
            copyLinks([node.getAttribute("data-copy") || ""]).catch(handleError);
          });
        });

        Array.prototype.forEach.call(el.fileBody.querySelectorAll("[data-move]"), function (node) {
          node.addEventListener("click", function () {
            moveFiles([node.getAttribute("data-move") || ""]).catch(handleError);
          });
        });

        Array.prototype.forEach.call(el.fileBody.querySelectorAll("[data-delete]"), function (node) {
          node.addEventListener("click", function () {
            deleteFiles([node.getAttribute("data-delete") || ""]).catch(handleError);
          });
        });

        updateMeta();
      }

      async function createFolder() {
        var seed = state.folderPath ? state.folderPath + "/" : "";
        var input = window.prompt("Folder path", seed + "new-folder");
        if (!input) return;
        var path = normalizeFolderPath(input);
        if (!path) return;
        await request("./api/manage/folders", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ path: path }),
        });
        await loadFolders();
        setStatus("Folder created");
      }

      async function renameFolder() {
        if (!state.folderPath) return;
        var parts = state.folderPath.split("/");
        var oldName = parts.pop();
        var parent = parts.join("/");
        var newName = window.prompt("New folder name", oldName);
        if (!newName) return;
        var targetPath = normalizeFolderPath((parent ? parent + "/" : "") + newName);
        if (!targetPath || targetPath === state.folderPath) return;
        await request("./api/manage/folders", {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ sourcePath: state.folderPath, targetPath: targetPath }),
        });
        state.folderPath = targetPath;
        await loadFolders();
        await loadFiles(true);
        setStatus("Folder renamed");
      }

      async function deleteFolder() {
        if (!state.folderPath) return;
        if (!window.confirm("Delete folder metadata only? Direct links stay valid.")) return;
        var parent = state.folderPath.split("/");
        parent.pop();
        await request("./api/manage/folders?path=" + encodeURIComponent(state.folderPath) + "&recursive=1", { method: "DELETE" });
        state.folderPath = parent.join("/");
        await loadFolders();
        await loadFiles(true);
        setStatus("Folder deleted");
      }

      async function moveFiles(ids) {
        var target = window.prompt("Move to folder path", state.folderPath || "");
        if (target == null) return;
        await request("./api/manage/files/move-folder", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ ids: ids, targetFolderPath: normalizeFolderPath(target) }),
        });
        ids.forEach(function (id) { state.selected.delete(id); });
        await loadFolders();
        await loadFiles(true);
        setStatus("Moved files");
      }

      async function deleteFiles(ids) {
        if (!ids.length) return;
        if (!window.confirm("Delete selected files?")) return;
        for (var i = 0; i < ids.length; i += 1) {
          var id = ids[i];
          if (!id) continue;
          await request("./api/manage/delete/" + encodeURIComponent(id));
          state.selected.delete(id);
        }
        await loadFolders();
        await loadFiles(true);
        setStatus("Deleted files");
      }

      async function copyLinks(ids) {
        var links = ids.filter(Boolean).map(function (id) { return location.origin + "/file/" + encodeURIComponent(id); });
        if (!links.length) return;
        if (navigator.clipboard && navigator.clipboard.writeText) {
          await navigator.clipboard.writeText(links.join("\n"));
        } else {
          var textarea = document.createElement("textarea");
          textarea.value = links.join("\n");
          document.body.appendChild(textarea);
          textarea.select();
          document.execCommand("copy");
          document.body.removeChild(textarea);
        }
        setStatus("Copied " + links.length + " direct links");
      }

      function bindEvents() {
        el.loadMoreBtn.addEventListener("click", function () { loadFiles(false).catch(handleError); });
        el.refreshBtn.addEventListener("click", function () {
          loadFolders().then(function () { return loadFiles(true); }).catch(handleError);
        });
        el.searchInput.addEventListener("keydown", function (event) {
          if (event.key !== "Enter") return;
          state.search = el.searchInput.value.trim();
          loadFiles(true).catch(handleError);
        });
        el.storageFilter.addEventListener("change", function () {
          state.storage = el.storageFilter.value || "all";
          state.folderPath = "";
          loadFolders().then(function () { return loadFiles(true); }).catch(handleError);
        });
        el.selectAll.addEventListener("change", function () {
          if (el.selectAll.checked) state.files.forEach(function (f) { state.selected.add(f.id); });
          else state.selected.clear();
          renderFiles();
        });
        el.newFolderBtn.addEventListener("click", function () { createFolder().catch(handleError); });
        el.renameFolderBtn.addEventListener("click", function () { renameFolder().catch(handleError); });
        el.deleteFolderBtn.addEventListener("click", function () { deleteFolder().catch(handleError); });
        el.moveSelectedBtn.addEventListener("click", function () { moveFiles(Array.from(state.selected)).catch(handleError); });
        el.copySelectedBtn.addEventListener("click", function () { copyLinks(Array.from(state.selected)).catch(handleError); });
        el.deleteSelectedBtn.addEventListener("click", function () { deleteFiles(Array.from(state.selected)).catch(handleError); });
      }

      function handleError(err) {
        console.error(err);
        setStatus((err && err.message) || "Failed", true);
      }

      (async function init() {
        bindEvents();
        var ok = await ensureAuth();
        if (!ok) return;
        await loadFolders();
        await loadFiles(true);
      })().catch(handleError);
    })();
  </script>
</body>
</html>
